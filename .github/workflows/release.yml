name: release-toolchain
# This repo (mage-releases) only HOSTS the Pages site + Releases. The compiler
# source lives in blessedbythestorm/mage, which we check out and build here.
on:
  workflow_dispatch:
    inputs:
      mage_ref:
        description: "mage compiler git ref to build"
        default: master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  bundle:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-x64, ext: "" }
          - { os: windows-latest, platform: windows-x64, ext: ".exe" }
    runs-on: ${{ matrix.os }}
    # The Windows leg is still being brought up: let it fail without failing
    # the workflow or blocking publish, so the proven Linux release keeps
    # shipping. (fail-fast: false keeps Linux running if Windows errors.)
    continue-on-error: ${{ matrix.platform == 'windows-x64' }}
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Check out the mage compiler repo
        uses: actions/checkout@v4
        with:
          repository: blessedbythestorm/mage
          ref: ${{ github.event.inputs.mage_ref || 'master' }}
          # `mage` is private, so the default GITHUB_TOKEN (scoped to this repo)
          # can't read it. Add a fine-grained PAT with read access to `mage` as
          # the MAGE_REPO_TOKEN secret. (Falls back to the default token, which
          # works if you make `mage` public instead.)
          token: ${{ secrets.MAGE_REPO_TOKEN || github.token }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install LLVM 21 + mold + patchelf (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y llvm-21-dev libllvm21 mold patchelf
          echo "LLVM_SYS_211_PREFIX_LINUX=$(llvm-config-21 --prefix)" >> "$GITHUB_ENV"

      - name: Install LLVM 21 (Windows, prebuilt)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # llvm-sys/inkwell need LLVM 21.1 with llvm-config + libs, which the
          # official LLVM Windows installer doesn't ship. vovkos/llvm-package-
          # windows publishes exactly that, built on GitHub Actions for this use
          # case. Use the libcmt (static-CRT) variant: magec's build.rs assumes
          # the prebuilt LLVM is static-CRT (it adds /NODEFAULTLIB:libcmt.lib).
          url="https://github.com/vovkos/llvm-package-windows/releases/download/llvm-21.1.1/llvm-21.1.1-windows-amd64-msvc17-libcmt.7z"
          curl -sSL -o llvm.7z "$url"
          7z x -ollvm-dist llvm.7z >/dev/null
          cfg="$(find "$PWD/llvm-dist" -name llvm-config.exe | head -1)"
          if [ -z "$cfg" ]; then echo "::error::llvm-config.exe not found in package"; exit 1; fi
          prefix="$(dirname "$(dirname "$cfg")")"
          prefix_win="$(cygpath -w "$prefix")"
          echo "resolved LLVM prefix: $prefix_win"
          ls "$prefix/bin/LLVM-C.dll" >/dev/null 2>&1 && echo "LLVM-C.dll present -> dynamic link" || echo "::warning::no LLVM-C.dll -> static fallback"
          # build.rs reads the _WINDOWS suffix for its cc include path; the
          # llvm-sys crate reads the UNSUFFIXED var (or finds llvm-config on
          # PATH). Set both, and put LLVM bin on PATH so (a) llvm-sys resolves
          # llvm-config system-wide and (b) the magec.exe smoke test + runtime
          # find LLVM-C.dll (it links dynamically against it).
          echo "LLVM_SYS_211_PREFIX_WINDOWS=$prefix_win" >> "$GITHUB_ENV"
          echo "LLVM_SYS_211_PREFIX=$prefix_win" >> "$GITHUB_ENV"
          cygpath -w "$prefix/bin" >> "$GITHUB_PATH"

      - name: Build magec + mage-lsp (Linux)
        if: runner.os == 'Linux'
        # magec/mage-lsp dynamically link libLLVM.so (fast builds, no static LLVM).
        # We ship libLLVM.so AND its whole dependency closure next to the binaries
        # (see the bundle step), so bake a $ORIGIN rpath pointing the loader at the
        # executable's own dir ($ORIGIN follows symlinks, so the ~/.mage/bin launcher
        # links resolve to toolchains/<v>/bin). This rpath finds libLLVM, magec's
        # DIRECT dependency; libLLVM's OWN transitive deps (libedit, libxml2, …) are
        # handled by patchelf-ing a $ORIGIN rpath onto every bundled lib in the
        # bundle step (the executable's rpath is not consulted for them). $ORIGIN
        # must reach the linker literally — set via env (GitHub does not shell-expand it).
        env:
          RUSTFLAGS: "-C link-arg=-Wl,-rpath,$ORIGIN"
        run: |
          cargo build --release --manifest-path magec/Cargo.toml
          cargo build --release --manifest-path mage-ls/Cargo.toml

      - name: Build magec + mage-lsp (Windows)
        if: runner.os == 'Windows'
        shell: bash
        # No rpath on Windows — the loader finds DLLs beside the .exe. LLVM is
        # static-CRT prebuilt; prefer-dynamic falls back to static if there's no
        # LLVM-C.dll, which is fine (self-contained magec.exe).
        run: |
          cargo build --release --manifest-path magec/Cargo.toml
          cargo build --release --manifest-path mage-ls/Cargo.toml
          echo "=== smoke: does magec.exe link + run? ==="
          ./magec/target/release/magec.exe --version

      - name: Build the mage package (mage + manifest-gen, via magec) [Linux]
        # Skipped on Windows: the Mage stdlib OS layer (std.os/sync/task, lib/http)
        # is still POSIX-only, so the mage package can't link on Windows yet. The
        # Windows bundle ships magec.exe + mage-lsp.exe only, for now.
        if: runner.os == 'Linux'
        run: |
          export PATH="$PWD/magec/target/release:$PWD/mage-ls/target/release:$PATH"
          (cd mage && magec build)

      - name: Assemble + zip the bundle (Linux)
        if: runner.os == 'Linux'
        run: |
          B="mage-$VERSION-${{ matrix.platform }}"
          mkdir -p "stage/$B/bin" "stage/$B/ext" "stage/$B/lib"
          cp "magec/target/release/magec${{ matrix.ext }}"      "stage/$B/bin/"
          cp "mage-ls/target/release/mage-lsp${{ matrix.ext }}" "stage/$B/bin/"
          cp "mage/out/mage${{ matrix.ext }}"                   "stage/$B/bin/"
          # Ship libLLVM.so AND its full dependency closure next to the binaries so
          # the toolchain runs on a clean machine. ldd flattens the whole recursive
          # tree; copy every resolved lib EXCEPT glibc + the compiler runtime, which
          # are present everywhere and unsafe to bundle (must match the host's
          # ld-linux). The per-object $ORIGIN rpath stamped just below then lets each
          # bundled lib find its siblings here.
          if ldd "stage/$B/bin/magec" | grep -q 'not found'; then
            echo "::error::libLLVM deps unresolved on the runner; closure would be incomplete"
            ldd "stage/$B/bin/magec" | grep 'not found'
            exit 1
          fi
          deny='^(libc|libm|libdl|librt|libpthread|ld-linux.*|linux-vdso|libstdc\+\+|libgcc_s)\.so'
          ldd "stage/$B/bin/magec" | awk '/=> \// {print $3}' | while read -r so; do
            base="$(basename "$so")"
            echo "$base" | grep -Eq "$deny" && continue
            dest="stage/$B/bin/$base"
            [ -e "$dest" ] || cp -L "$so" "$dest"
          done
          if ! ls "stage/$B/bin/"libLLVM.so* >/dev/null 2>&1; then
            echo "::error::libLLVM.so was not bundled"; exit 1
          fi
          # Stamp $ORIGIN onto EVERY bundled ELF (libs + binaries). The loader does
          # NOT consult the executable's rpath when resolving a shared lib's own
          # transitive deps — so libLLVM must carry its own $ORIGIN to find libedit,
          # libedit to find libtinfo, libxml2 to find libicu, and so on. With each
          # object pointing at its siblings here, the toolchain runs with no
          # LD_LIBRARY_PATH on a clean machine.
          for f in "stage/$B/bin/"*.so* "stage/$B/bin/magec" "stage/$B/bin/mage-lsp" "stage/$B/bin/mage"; do
            patchelf --set-rpath '$ORIGIN' "$f"
          done
          echo "bundled shared libs:"; ls -lh "stage/$B/bin/"*.so* | awk '{print $5, $9}'
          # Bundle the Zed editor extension (source; Zed builds it on install).
          cp -r mage-zed "stage/$B/ext/mage-zed"
          rm -rf "stage/$B/ext/mage-zed/target" "stage/$B/ext/mage-zed/.git"
          # Bundle the standard library (source) + its mandatory minicoro sibling.
          # std is the implicit dependency of every project, so the installed
          # toolchain must carry it to compile anything; magec discovers it at
          # <toolchain>/lib/std relative to its own binary. std/build.m does
          # b.depend("../minicoro"), so minicoro must sit beside std. Ship source
          # only — strip per-package build artifacts.
          for pkg in std minicoro; do
            rsync -a --exclude out --exclude .mage-cache --exclude .global-cache \
              "lib/$pkg/" "stage/$B/lib/$pkg/"
          done
          (cd "stage/$B" && zip -r "../$B.zip" .)
          sha256sum "stage/$B.zip" | cut -d' ' -f1 > "stage/$B.zip.sha256"

      - name: Assemble + zip the bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        # Minimal Windows bundle: the compiler + LSP (both Rust) plus the LLVM
        # DLL if magec dynamically linked it, and lld-link/clang for the user's
        # build step. No mage.exe / lib yet (stdlib OS layer not ported).
        run: |
          B="mage-$VERSION-windows-x64"
          mkdir -p "stage/$B/bin"
          cp magec/target/release/magec.exe       "stage/$B/bin/"
          cp mage-ls/target/release/mage-lsp.exe   "stage/$B/bin/"
          P="$LLVM_SYS_211_PREFIX_WINDOWS"
          Pmsys="$(cygpath -u "$P")"
          # magec.exe links dynamically against LLVM-C.dll — ship it (and the LLVM
          # DLLs it may pull in) beside the exe so the loader finds them.
          for dll in LLVM-C.dll LTO.dll Remarks.dll; do
            [ -f "$Pmsys/bin/$dll" ] && cp "$Pmsys/bin/$dll" "stage/$B/bin/"
          done
          # Bundle the linker + C compiler magec shells out to at build time
          # (lld-link ships with the LLVM package; clang is in vovkos's separate
          # clang package, so it may be absent here — tolerated for now).
          cp "$Pmsys/bin/lld-link.exe" "stage/$B/bin/" 2>/dev/null || true
          cp "$Pmsys/bin/clang.exe"    "stage/$B/bin/" 2>/dev/null || true
          # Ship the stdlib source + its minicoro sibling + the Zed extension, so
          # the Windows bundle matches Linux (magec finds lib/std relative to its
          # own exe). std can't fully *compile* on Windows until its OS layer is
          # ported, but shipping the source keeps the bundle structurally complete.
          mkdir -p "stage/$B/lib" "stage/$B/ext"
          for pkg in std minicoro; do
            cp -r "lib/$pkg" "stage/$B/lib/$pkg"
            rm -rf "stage/$B/lib/$pkg/out" "stage/$B/lib/$pkg/.mage-cache" "stage/$B/lib/$pkg/.global-cache"
          done
          cp -r mage-zed "stage/$B/ext/mage-zed"
          rm -rf "stage/$B/ext/mage-zed/target" "stage/$B/ext/mage-zed/.git"
          echo "=== windows bundle contents ==="; ls -R "stage/$B" | head -40
          ( cd "stage/$B" && 7z a -tzip "../$B.zip" . >/dev/null )
          sha256sum "stage/$B.zip" | cut -d' ' -f1 > "stage/$B.zip.sha256"

      - name: Upload manifest-gen (linux only)
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: tool-manifest-gen
          path: mage/out/manifest-gen

      # The mage CLI is the standalone bootstrap: a user downloads it first,
      # then `mage update` pulls the toolchain. It links no LLVM, so it ships
      # as a separate bare binary. Linux only for now — a Windows mage.exe
      # needs the stdlib OS/download layer ported (tracked separately).
      - name: Upload mage CLI bootstrap (linux only)
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: mage-cli-linux-x64
          path: mage/out/mage

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            stage/*.zip
            stage/*.zip.sha256

  publish:
    needs: [version, bundle]
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      VERSION: ${{ needs.version.outputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bundle-*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: tool-manifest-gen
          path: tool
      - uses: actions/download-artifact@v4
        with:
          name: mage-cli-linux-x64
          path: magecli

      - name: Publish bundles as a GitHub Release
        run: |
          # Stable, versionless bootstrap names so /releases/latest/download/
          # always points at the newest CLI.
          cp magecli/mage mage-linux-x64
          gh release create "v$VERSION" artifacts/*.zip mage-linux-x64 \
            --repo "${{ github.repository }}" \
            --title "mage $VERSION" --notes "Automated toolchain build."

      - name: Generate latest.bin (bundle urls -> release assets)
        run: |
          chmod +x tool/manifest-gen
          mkdir -p site
          ARGS=()
          for p in linux-x64; do
            sha="$(cat artifacts/mage-$VERSION-$p.zip.sha256)"
            url="https://github.com/${{ github.repository }}/releases/download/v$VERSION/mage-$VERSION-$p.zip"
            ARGS+=("$p" "$url" "$sha")
          done
          ./tool/manifest-gen site/latest.bin "$VERSION" "${ARGS[@]}"
          printf '<!doctype html><h1>mage toolchain</h1><p>latest: %s</p><p><a href="latest.bin">latest.bin</a></p>\n' "$VERSION" > site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
