name: release-toolchain
# This repo (mage-releases) only HOSTS the Pages site + Releases. The compiler
# source lives in blessedbythestorm/mage, which we check out and build here.
on:
  workflow_dispatch:
    inputs:
      mage_ref:
        description: "mage compiler git ref to build"
        default: master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  bundle:
    needs: version
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-x64, ext: "" }
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Check out the mage compiler repo
        uses: actions/checkout@v4
        with:
          repository: blessedbythestorm/mage
          ref: ${{ github.event.inputs.mage_ref || 'master' }}
          # `mage` is private, so the default GITHUB_TOKEN (scoped to this repo)
          # can't read it. Add a fine-grained PAT with read access to `mage` as
          # the MAGE_REPO_TOKEN secret. (Falls back to the default token, which
          # works if you make `mage` public instead.)
          token: ${{ secrets.MAGE_REPO_TOKEN || github.token }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install LLVM 21 (magec links inkwell/llvm21)
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y llvm-21-dev libllvm21
          echo "LLVM_SYS_211_PREFIX_LINUX=$(llvm-config-21 --prefix)" >> "$GITHUB_ENV"

      - name: Build magec + mage-lsp (Rust)
        run: |
          cargo build --release --manifest-path magec/Cargo.toml
          cargo build --release --manifest-path mage-ls/Cargo.toml

      - name: Build the mage package (mage + manifest-gen, via magec)
        run: |
          export PATH="$PWD/magec/target/release:$PWD/mage-ls/target/release:$PATH"
          (cd mage && magec build)

      - name: Assemble + zip the bundle
        run: |
          B="mage-$VERSION-${{ matrix.platform }}"
          mkdir -p "stage/$B/bin" "stage/$B/ext"
          cp "magec/target/release/magec${{ matrix.ext }}"      "stage/$B/bin/"
          cp "mage-ls/target/release/mage-lsp${{ matrix.ext }}" "stage/$B/bin/"
          cp "mage/out/mage${{ matrix.ext }}"                   "stage/$B/bin/"
          # Bundle the Zed editor extension (source; Zed builds it on install).
          cp -r mage-zed "stage/$B/ext/mage-zed"
          rm -rf "stage/$B/ext/mage-zed/target" "stage/$B/ext/mage-zed/.git"
          (cd "stage/$B" && zip -r "../$B.zip" .)
          sha256sum "stage/$B.zip" | cut -d' ' -f1 > "stage/$B.zip.sha256"

      - name: Upload manifest-gen (linux only)
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: tool-manifest-gen
          path: mage/out/manifest-gen

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            stage/*.zip
            stage/*.zip.sha256

  publish:
    needs: [version, bundle]
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      VERSION: ${{ needs.version.outputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bundle-*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: tool-manifest-gen
          path: tool

      - name: Publish bundles as a GitHub Release
        run: |
          gh release create "v$VERSION" artifacts/*.zip \
            --repo "${{ github.repository }}" \
            --title "mage $VERSION" --notes "Automated toolchain build."

      - name: Generate latest.bin (bundle urls -> release assets)
        run: |
          chmod +x tool/manifest-gen
          mkdir -p site
          ARGS=()
          for p in linux-x64; do
            sha="$(cat artifacts/mage-$VERSION-$p.zip.sha256)"
            url="https://github.com/${{ github.repository }}/releases/download/v$VERSION/mage-$VERSION-$p.zip"
            ARGS+=("$p" "$url" "$sha")
          done
          ./tool/manifest-gen site/latest.bin "$VERSION" "${ARGS[@]}"
          printf '<!doctype html><h1>mage toolchain</h1><p>latest: %s</p><p><a href="latest.bin">latest.bin</a></p>\n' "$VERSION" > site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
